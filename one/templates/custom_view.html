<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OnTime Timer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --col-default:  #ffffff;
      --col-warning:  #fbbf24;
      --col-danger:   #f97316;
      --col-overtime: #ef4444;
      --col-stopped:  #4b5563;
      --col-dim:      #374151;
    }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      color: var(--col-default);
      font-family: 'SF Mono', 'Fira Code', 'Courier New', monospace;
      overflow: hidden;
      user-select: none;
    }

    /* ── Layout ── */
    .stage {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0;
      position: relative;
    }

    /* ── Event title ── */
    .event-title {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: clamp(16px, 2.5vw, 40px);
      font-weight: 500;
      color: #9ca3af;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 2vh;
      max-width: 80vw;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: color 0.5s ease;
      min-height: 1em;
    }

    /* ── Main timer ── */
    .main-timer {
      font-size: clamp(80px, 20vw, 280px);
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--col-default);
      transition: color 0.4s ease;
      font-variant-numeric: tabular-nums;
    }

    .main-timer.phase-warning  { color: var(--col-warning); }
    .main-timer.phase-danger   { color: var(--col-danger); }
    .main-timer.phase-overtime { color: var(--col-overtime); }
    .main-timer.phase-stopped  { color: var(--col-stopped); }

    /* ── Overtime label ── */
    .overtime-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: clamp(12px, 1.8vw, 28px);
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--col-overtime);
      margin-top: 1vh;
      opacity: 0;
      transition: opacity 0.3s ease;
      min-height: 1em;
    }

    .overtime-label.visible { opacity: 1; }

    /* ── Progress bar ── */
    .progress-track {
      width: clamp(200px, 60vw, 900px);
      height: 4px;
      background: #1f2937;
      border-radius: 2px;
      margin-top: 3vh;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      border-radius: 2px;
      background: var(--col-default);
      transition: width 0.5s linear, background 0.4s ease;
      transform-origin: left;
    }

    .phase-warning  .progress-fill { background: var(--col-warning); }
    .phase-danger   .progress-fill { background: var(--col-danger); }
    .phase-overtime .progress-fill { background: var(--col-overtime); }

    /* ── Aux timer ── */
    .aux-row {
      display: flex; align-items: center; gap: 1.5vw;
      margin-top: 3vh;
      opacity: 0;
      transition: opacity 0.4s ease;
      min-height: clamp(30px, 5vw, 80px);
    }

    .aux-row.visible { opacity: 1; }

    .aux-label {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: clamp(10px, 1.2vw, 20px);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #4b5563;
      text-transform: uppercase;
    }

    .aux-timer {
      font-size: clamp(30px, 5vw, 80px);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #6b7280;
      font-variant-numeric: tabular-nums;
    }

    /* ── Clock ── */
    .clock {
      position: absolute;
      bottom: 3vh; right: 3vw;
      font-size: clamp(14px, 1.6vw, 26px);
      font-weight: 500;
      color: #374151;
      letter-spacing: 0.05em;
      font-variant-numeric: tabular-nums;
    }

    /* ── Next event ── */
    .next-event {
      position: absolute;
      bottom: 3vh; left: 3vw;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      font-size: clamp(11px, 1.2vw, 20px);
      font-weight: 500;
      color: #374151;
      max-width: 40vw;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .next-event span { color: #4b5563; }

    /* ── Status dot ── */
    .conn-dot {
      position: absolute;
      top: 2.5vh; right: 2.5vw;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1f2937;
      transition: background 0.4s ease;
    }

    .conn-dot.connected    { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .conn-dot.reconnecting { background: #f59e0b; animation: blink 1s infinite; }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    /* ── Playback indicator ── */
    .playback-icon {
      position: absolute;
      top: 2.5vh; left: 2.5vw;
      font-size: clamp(10px, 1.2vw, 18px);
      font-weight: 700;
      letter-spacing: 0.15em;
      color: #1f2937;
      text-transform: uppercase;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      transition: color 0.3s ease;
    }

    .playback-icon.play  { color: #22c55e; }
    .playback-icon.pause { color: #f59e0b; }
    .playback-icon.armed { color: #6b7280; }
    .playback-icon.roll  { color: #60a5fa; }
  </style>
</head>
<body>
<div class="stage" id="stage">
  <div class="conn-dot" id="conn-dot"></div>
  <div class="playback-icon" id="playback-icon">STOP</div>

  <div class="event-title" id="event-title"></div>

  <div class="main-timer" id="main-timer">--:--</div>

  <div class="overtime-label" id="overtime-label">OVERTIME</div>

  <div class="progress-track" id="progress-track">
    <div class="progress-fill" id="progress-fill" style="width:0%"></div>
  </div>

  <div class="aux-row" id="aux-row">
    <div class="aux-label">AUX</div>
    <div class="aux-timer" id="aux-timer">--:--</div>
  </div>

  <div class="next-event" id="next-event"></div>
  <div class="clock" id="clock">--:--:--</div>
</div>

<script>
  // ── Formatting ────────────────────────────────────────────────────────────────
  function pad(n) { return String(Math.abs(n)).padStart(2, '0'); }

  function fmtMs(ms) {
    if (ms === null || ms === undefined) return null;
    const neg = ms < 0;
    const abs = Math.abs(ms);
    const h   = Math.floor(abs / 3600000);
    const m   = Math.floor((abs % 3600000) / 60000);
    const s   = Math.floor((abs % 60000) / 1000);
    const str = h > 0 ? `${h}:${pad(m)}:${pad(s)}` : `${m}:${pad(s)}`;
    return (neg ? '-' : '') + str;
  }

  function fmtClock(ms) {
    if (!ms && ms !== 0) return '--:--:--';
    const h = Math.floor(ms / 3600000) % 24;
    const m = Math.floor((ms % 3600000) / 60000);
    const s = Math.floor((ms % 60000) / 1000);
    return `${pad(h)}:${pad(m)}:${pad(s)}`;
  }

  // ── DOM refs ──────────────────────────────────────────────────────────────────
  const $stage      = document.getElementById('stage');
  const $connDot    = document.getElementById('conn-dot');
  const $playback   = document.getElementById('playback-icon');
  const $title      = document.getElementById('event-title');
  const $main       = document.getElementById('main-timer');
  const $overtime   = document.getElementById('overtime-label');
  const $track      = document.getElementById('progress-track');
  const $fill       = document.getElementById('progress-fill');
  const $auxRow     = document.getElementById('aux-row');
  const $aux        = document.getElementById('aux-timer');
  const $next       = document.getElementById('next-event');
  const $clock      = document.getElementById('clock');

  // ── State ─────────────────────────────────────────────────────────────────────
  let ws          = null;
  let ontimeIp    = null;
  let reconnTimer = null;
  let lastDuration = 0;

  // ── Connect ───────────────────────────────────────────────────────────────────
  async function init() {
    const res  = await fetch('/status');
    const data = await res.json();
    ontimeIp   = data.mode === 'local' ? '127.0.0.1' : data.ip;
    if (!ontimeIp) { showOffline('No server configured'); return; }
    connect();
  }

  function connect() {
    clearTimeout(reconnTimer);
    $connDot.className = 'conn-dot reconnecting';

    ws = new WebSocket(`ws://${ontimeIp}:4001/ws`);

    ws.onopen = () => {
      $connDot.className = 'conn-dot connected';
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        // OnTime v4 sends {type, payload} or direct payload
        const payload = msg.payload ?? msg;
        if (msg.type === 'ontime-runtime' || payload.timer) {
          render(payload);
        }
      } catch {}
    };

    ws.onclose = () => {
      $connDot.className = 'conn-dot reconnecting';
      reconnTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => ws.close();
  }

  function showOffline(msg) {
    $main.textContent = '--:--';
    $title.textContent = msg;
    $connDot.className = 'conn-dot';
  }

  // ── Render ────────────────────────────────────────────────────────────────────
  function render(d) {
    const timer    = d.timer    ?? {};
    const eventNow = d.eventNow ?? null;
    const eventNext= d.eventNext?? null;

    // Phase & playback
    const phase    = timer.phase    ?? 'default';
    const playback = timer.playback ?? 'stop';
    const current  = timer.current  ?? null;
    const duration = timer.duration ?? lastDuration;
    if (duration) lastDuration = duration;

    // ── Main timer ──
    const timeStr = fmtMs(current);
    $main.textContent = timeStr ?? '--:--';

    // Phase class
    $main.className = 'main-timer';
    if (playback === 'stop' || playback === 'armed') {
      $main.classList.add('phase-stopped');
    } else if (phase === 'overtime') {
      $main.classList.add('phase-overtime');
    } else if (phase === 'danger') {
      $main.classList.add('phase-danger');
    } else if (phase === 'warning') {
      $main.classList.add('phase-warning');
    }

    // Overtime label
    $overtime.classList.toggle('visible', phase === 'overtime');

    // ── Progress bar ──
    let pct = 0;
    if (duration > 0 && current !== null) {
      if (phase === 'overtime') {
        pct = 100;
      } else {
        pct = Math.min(100, Math.max(0, ((duration - current) / duration) * 100));
      }
    }
    $fill.style.width = pct + '%';

    // Sync progress track phase class
    $track.className = 'progress-track ' + $main.className.replace('main-timer', '').trim();

    // ── Playback icon ──
    const pbMap = { play: '▶ PLAY', pause: '⏸ PAUSE', armed: 'ARMED', roll: '⟳ ROLL', stop: 'STOP' };
    $playback.textContent = pbMap[playback] ?? playback.toUpperCase();
    $playback.className   = `playback-icon ${playback}`;

    // ── Event title ──
    $title.textContent = eventNow?.title ?? '';

    // ── Aux / secondary timer ──
    const aux = timer.secondaryTimer ?? null;
    if (aux !== null && aux !== undefined) {
      $aux.textContent = fmtMs(aux) ?? '--:--';
      $auxRow.classList.add('visible');
    } else {
      $auxRow.classList.remove('visible');
    }

    // ── Next event ──
    if (eventNext?.title) {
      $next.innerHTML = `<span>NEXT</span> ${eventNext.title}`;
    } else {
      $next.textContent = '';
    }

    // ── Clock ──
    $clock.textContent = fmtClock(d.clock);
  }

  // ── Tick clock locally between WS updates ────────────────────────────────────
  setInterval(() => {
    // Only update clock display independently — WS data drives everything else
  }, 1000);

  init();
</script>
</body>
</html>
